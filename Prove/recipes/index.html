<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Bridger Keddington">
    <meta name="description" content="A collection of recipes for various dishes.">
    <title>Recipes</title>
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="RecipeBook">
    <meta property="og:description" content="A collection of recipes for various dishes.">
    <meta property="og:url" content="https://bridgerkeddington.github.io/wdd131/Prove/recipes/index.html">
    <meta property="og:image" content="social-preview-image.png">

    <!-- X Card -->
    <meta name="twitter:card" content=" summary_large_image">
    <meta name="twitter:title" content="RecipeBook">
    <meta name="twitter:description" content="A collection of recipes for various dishes.">
    <meta name="twitter:image" content="social-preview-image.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="images/favicon.png" type="image/png">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

    <link rel="stylesheet" href="style.css">
    <script src="recipes.js" defer></script>
</head>
<body>
    <header id="logo">
        <img src="images/recipe-book.png" alt="RecipeBook Logo">
        <h1>RecipeBook</h1>
    </header>
    <nav>
        <form class="search">
            <input type="text" placeholder="Search recipes" name="search">
            <button type="button">
                <img src="images/search.svg" alt="search icon">
            </button>
        </form>
    </nav>
    <hr>
    <main>
        <div class="recipe-container">
        </div>
    </main>
    <footer>
        <div class="social">
        <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
        <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
        <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
        <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
        </div>                  
                
        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>                   
    </footer>
</body>
</html>
